name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: tests (macOS Apple Silicon)
    runs-on: macos-latest        # arm64 — the platform scribe targets
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Sync dependencies (Python 3.12)
        run: uv sync --extra dev --python 3.12

      - name: Run tests
        run: uv run pytest -q
